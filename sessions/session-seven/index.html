<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upcoming Session | AI and Digital Skills</title>
  <link rel="icon" type="image/png" href="../../assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F9F8F6;
      --text: #1A1A1A;
      --text-muted: #666666;
      --line: #E5E2DD;
      --accent: #2C3E50;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .navbar {
      width: 100%;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      padding: 1rem 2rem;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 500;
    }
    .nav-menu {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }
    .nav-menu a {
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 500;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .nav-menu a:hover { color: var(--text); }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-style: italic;
      margin-bottom: 1rem;
    }
    p {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 500px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">Upcoming Session</div>
      <ul class="nav-menu">
        <li><a href="../../">Home</a></li>
        <li><a href="../../syllabus/">Syllabus</a></li>
      </ul>
    </div>
  </nav>
  <main class="main-content">
    <h1>Upcoming Session</h1>
    <p>This session content is currently being prepared and will be available soon. Please check back later.</p>
  </main>
</body>
</html>
